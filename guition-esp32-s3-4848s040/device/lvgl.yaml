lvgl:
  buffer_size: 100%

  top_layer:
    widgets:
      - label:
          text: "-° / -°"
          id: temperatures
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: row_wrap
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: lights_nav_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Lights"
            on_press:
              - lvgl.page.show: lounge_lights_page

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: scenes_nav_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $clock-five
              - label:
                  align: bottom_left
                  text: "Scenes"
            on_press:
              - lvgl.page.show: lounge_scenes_page

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: media_nav_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $music_circle
              - label:
                  align: bottom_left
                  text: "Media"
            on_press:
              - lvgl.page.show: lounge_media_page

    - id: lounge_lights_page
      layout:
        type: flex
        flex_flow: row_wrap
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: lounge_lights_back_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_press:
              - lvgl.page.show: main_page

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: blue_lamp_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Blue Lamp"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.blue_lamp

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: lounge_bulb_1_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Bulb 1"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.lounge_bulb_1

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: lounge_bulb_2_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Bulb 2"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.lounge_bulb_2

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: lounge_bulb_3_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Bulb 3"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.lounge_bulb_3

    - id: lounge_scenes_page
      layout:
        type: flex
        flex_flow: row_wrap
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: lounge_scenes_back_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_press:
              - lvgl.page.show: main_page

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: scene_wake_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $alarm
              - label:
                  align: bottom_left
                  text: "Wake"
            on_press:
              - homeassistant.action:
                  action: scene.turn_on
                  data:
                    entity_id: scene.wake_2

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: scene_early_morning_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $sunrise
              - label:
                  align: bottom_left
                  text: "Early AM"
            on_press:
              - homeassistant.action:
                  action: scene.turn_on
                  data:
                    entity_id: scene.early_morning_2

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: scene_morning_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $sun
              - label:
                  align: bottom_left
                  text: "Morning"
            on_press:
              - homeassistant.action:
                  action: scene.turn_on
                  data:
                    entity_id: scene.lounge_morning

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: scene_goodnight_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $night
              - label:
                  align: bottom_left
                  text: "Goodnight"
            on_press:
              - homeassistant.action:
                  action: scene.turn_on
                  data:
                    entity_id: scene.lounge_room_goodnight

    - id: lounge_media_page
      layout:
        type: flex
        flex_flow: row_wrap
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: lounge_media_back_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_press:
              - lvgl.page.show: main_page

        - label:
            text: "Media later"
            align: center
            text_color: 0xFFFFFF