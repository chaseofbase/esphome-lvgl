            checked: !lambda return x;

  - platform: homeassistant
    id: lounge_bulb_3_state
    entity_id: light.lounge_bulb_3
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: lounge_bulb_3_button
          state:
            checked: !lambda return x;
                   
  - platform: homeassistant
    id: wiim_muted
    entity_id: media_player.living_room_wiim
    attribute: is_volume_muted
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
        id: wiim_mute_button
        state:
            checked: !lambda return x;
            
 