sensor:
  - platform: homeassistant
    entity_id: sensor.lounge_room_temperature_temperature
    id: lounge_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d%%"
            args: [ '(int)round(x)', '(int)round(id(lounge_humidity).state)' ]

  - platform: homeassistant
    entity_id: sensor.lounge_room_temperature_humidity
    id: lounge_humidity
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d%%"
            args: [ '(int)round(id(lounge_temperature).state)', '(int)round(x)' ]


binary_sensor:
  - platform: homeassistant
    id: blue_lamp_state
    entity_id: light.blue_lamp
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: blue_lamp_button
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: lounge_bulb_1_state
    entity_id: light.lounge_bulb_1
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: lounge_bulb_1_button
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: lounge_bulb_2_state
