lvgl:
  buffer_size: 100%

  top_layer:
    widgets:
      - label:
          text: "-° / -°"
          id: temperatures
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
          
      - label:
          text: "Bedroom"
          id: room_name
          styles: roboto15_style
          align: top_right
          x: -8
          y: 4
          text_align: right
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 10
        pad_column: 10
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 52
      pad_bottom: 5
      pad_left: 10
      pad_right: 10

      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: lights_nav_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Lights"
            on_press:
              - lvgl.page.show: bedroom_lights_page

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: scenes_nav_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $clock
              - label:
                  align: bottom_left
                  text: "Scenes"
            on_press:
              - lvgl.page.show: bedroom_scenes_page

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: media_nav_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $music_circle
              - label:
                  align: bottom_left
                  text: "Media"
            on_press:
              - lvgl.page.show: bedroom_media_page
              
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: climate_nav_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $thermometer
              - label:
                  align: bottom_left
                  text: "Climate"
            on_press:
              - lvgl.page.show: bedroom_climate_page       

    - id: bedroom_lights_page
      layout:
        type: flex
        flex_flow: row_wrap
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: bedroom_lights_back_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_press:
              - lvgl.page.show: main_page
      
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: nightstand_lamp_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lamp
              - label:
                  align: bottom_left
                  text: "Bedside"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.nightstand_lamp     
 
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: bedroom_lamp_1_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Floor 1"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.bedroom_lamp_1

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: bedroom_lamp_2_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Floor 2"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.bedroom_lamp_2

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: dresser_lamp_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lamp
              - label:
                  align: bottom_left
                  text: "Dresser"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.dresser_lamp
                    
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: white_noise_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $whitenoise
              - label:
                  align: bottom_left
                  text: "White Noise"
            on_press:
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: switch.white_noise

      
      
    - id: bedroom_scenes_page
      layout:
        type: flex
        flex_flow: row_wrap
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: lounge_scenes_back_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_press:
              - lvgl.page.show: main_page

       
                    
    - id: bedroom_media_page
      layout:
        type: flex
        flex_flow: column
        pad_row: 8
        flex_align_main: SPACE_BETWEEN
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 8
      pad_left: 8
      pad_right: 8
    
      widgets:
     
        - container:
            width: 100%
            height: 64
            layout:
              type: flex
              flex_flow: row
              pad_column: 6
            widgets:
              - button:
                  width: 16%
                  height: 100%
                  checkable: false
                  id: lounge_media_back_button
                  styles: control
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $chevron_left
                  on_press:
                    - lvgl.page.show: main_page

              

            
    - id: bedroom_climate_page
      layout:
        type: flex
        flex_flow: row_wrap
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: lounge_temperature_back_button
            styles: control 
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_press:
              - lvgl.page.show: main_page
