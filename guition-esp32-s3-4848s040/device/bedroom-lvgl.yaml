lvgl:
  buffer_size: 100%

  top_layer:
    widgets:
      - label:
          text: "-° / -°"
          id: temperatures
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
          
      - label:
          text: "Bedroom"
          id: room_name
          styles: roboto15_style
          align: top_right
          x: -8
          y: 4
          text_align: right
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 24
        pad_column: 24
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 72
      pad_bottom: 20
      pad_left: 44
      pad_right: 44

      widgets:
        - button:
            height: 150px
            width: 170px
            checkable: false
            id: lights_nav_button
            styles: nav_lights
            widgets:
              - label:
                  text_font: icon_font_large
                  align: center
                  text: $lightbulb
            on_press:
              - lvgl.page.show: bedroom_lights_page

        - button:
            height: 150px
            width: 170px
            checkable: false
            id: scenes_nav_button
            styles: nav_scenes
            widgets:
              - label:
                  text_font: icon_font_large
                  align: center
                  text: $clock
            on_press:
              - lvgl.page.show: bedroom_scenes_page

        - button:
            height: 150px
            width: 170px
            checkable: false
            id: media_nav_button
            styles: nav_media
            widgets:
              - label:
                  text_font: icon_font_large
                  align: center
                  text: $music_circle
            on_press:
              - lvgl.page.show: bedroom_media_page
              
        - button:
            height: 150px
            width: 170px
            checkable: false
            id: climate_nav_button
            styles: nav_climate
            widgets:
              - label:
                  text_font: icon_font_large
                  align: center
                  text: $thermometer
            on_press:
              - lvgl.page.show: bedroom_climate_page        

    - id: bedroom_lights_page
      layout:
        type: flex
        flex_flow: row_wrap
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: bedroom_lights_back_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_press:
              - lvgl.page.show: main_page
      
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: nightstand_lamp_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lamp
              - label:
                  align: bottom_left
                  text: "Bedside"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.nightstand_lamp     
 
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: bedroom_lamp_1_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Floor 1"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.bedroom_lamp_1

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: bedroom_lamp_2_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Floor 2"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.bedroom_lamp_2

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: dresser_lamp_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lamp
              - label:
                  align: bottom_left
                  text: "Dresser"
            on_press:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.dresser_lamp
                    
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: white_noise_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $whitenoise
              - label:
                  align: bottom_left
                  text: "White Noise"
            on_press:
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: switch.white_noise

      
        
