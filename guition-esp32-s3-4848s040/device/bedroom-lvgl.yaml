    - id: bedroom_media_page
      layout:
        type: flex
        flex_flow: column
        pad_row: 8
        flex_align_main: SPACE_BETWEEN
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 8
      pad_left: 8
      pad_right: 8
    
      widgets:
     
        - container:
            width: 100%
            height: 64
            layout:
              type: flex
              flex_flow: row
              pad_column: 6
            widgets:
              - button:
                  width: 16%
                  height: 100%
                  checkable: false
                  id: lounge_media_back_button
                  styles: control
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $chevron_left
                  on_press:
                    - lvgl.page.show: main_page

              

            
    - id: bedroom_climate_page
      layout:
        type: flex
        flex_flow: row_wrap
      scrollbar_mode: "off"
      scroll_dir: "ver"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: lounge_temperature_back_button
            styles: control 
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_press:
              - lvgl.page.show: main_page
