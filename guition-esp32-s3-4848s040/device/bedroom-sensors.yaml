  - platform: homeassistant
    id: bedroom_lamp_2_state
    entity_id: light.bedroom_lamp_2
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: bedroom_lamp_2_button
            state:
