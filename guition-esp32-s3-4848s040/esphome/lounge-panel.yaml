substitutions:
  name: "lounge-panel"
  friendly_name: "Lounge Panel"
  room: "Lounge Room"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  area: ${room}


http_request:
  verify_ssl: false

online_image:
  - url: "http://192.168.0.35:8123/api/media_player_proxy/media_player.living_room_wiim?token=637d1b9ec33cb58781091c1551ae0393bea393b0f4c5fb523ac5a8dfe306b532&cache=ef0ea88fb4292481"
    id: wiim_album_art
    format: jpeg
    type: RGB565
    resize: 220x220
    update_interval: 10s



logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: 192.168.0.201
    gateway: 192.168.0.1
    subnet: 255.255.255.0
    dns1: 192.168.0.1
    dns2: 8.8.8.8


  ap:
    ssid: "${name} Fallback"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80


packages:
  setup:
    url: https://github.com/chaseofbase/esphome-lvgl
    ref: main
    refresh: 0s
    files:
      - guition-esp32-s3-4848s040/device/device.yaml
      - guition-esp32-s3-4848s040/device/sensors.yaml
      - guition-esp32-s3-4848s040/device/lvgl.yaml
      - guition-esp32-s3-4848s040/addon/backlight.yaml
      - guition-esp32-s3-4848s040/addon/time.yaml
      - guition-esp32-s3-4848s040/addon/network.yaml
      - guition-esp32-s3-4848s040/assets/fonts.yaml
      - guition-esp32-s3-4848s040/assets/icons.yaml
      - guition-esp32-s3-4848s040/theme/button.yaml
    