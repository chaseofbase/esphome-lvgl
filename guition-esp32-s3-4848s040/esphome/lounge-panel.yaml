substitutions:
  name: "lounge-panel"
  friendly_name: "Lounge Panel"
  room: "Lounge Room"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  area: ${room}
  on_boot:
    priority: -10
    then:
      - component.update: wiim_album_art

http_request:
  verify_ssl: false

online_image:
  - url: "https://via.placeholder.com/300.png"
    id: wiim_album_art
    format: png
    type: RGB565
    resize: 220x220
    update_interval: never



logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: 192.168.0.201
    gateway: 192.168.0.1
    subnet: 255.255.255.0
    dns1: 192.168.0.1
    dns2: 8.8.8.8


  ap:
    ssid: "${name} Fallback"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80


packages:
  setup:
    url: https://github.com/chaseofbase/esphome-lvgl
    ref: main
    refresh: 0s
    files:
      - guition-esp32-s3-4848s040/device/device.yaml
      - guition-esp32-s3-4848s040/device/sensors.yaml
      - guition-esp32-s3-4848s040/device/lvgl.yaml
      - guition-esp32-s3-4848s040/addon/backlight.yaml
      - guition-esp32-s3-4848s040/addon/time.yaml
      - guition-esp32-s3-4848s040/addon/network.yaml
      - guition-esp32-s3-4848s040/assets/fonts.yaml
      - guition-esp32-s3-4848s040/assets/icons.yaml
      - guition-esp32-s3-4848s040/theme/button.yaml
    