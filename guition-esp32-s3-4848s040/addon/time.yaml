# Snmp Time
time:
  - platform: sntp
    id: sntp_time
    timezone: Australia/Melbourne
    servers:
     - 0.au.pool.ntp.org
     - 1.au.pool.ntp.org
     - 2.au.pool.ntp.org
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

# Clock
script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[17];
            auto now = id(sntp_time).now();

            int hour = now.hour;
            int minute = now.minute;

            const char* am_pm = "AM";
            if (hour >= 12) am_pm = "PM";

            hour = hour % 12;
            if (hour == 0) hour = 12;

            snprintf(time_buf, sizeof(time_buf), "%d:%02d %s", hour, minute, am_pm);
            return time_buf;
